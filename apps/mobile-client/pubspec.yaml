name: beauteavenue_mobile_client
description: Client mobile app for Beauté Avenue.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.2.3

  # HTTP
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Responsive design (.r .sp .w .h)
  flutter_screenutil: ^5.9.3

  # Secure key-value (tokens only)
  flutter_secure_storage: ^10.0.0

  # Cache (lists, feed data)
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4

  # Network images with caching
  cached_network_image: ^3.4.1

  # Offline detection
  connectivity_plus: ^7.1.1

  # External URLs (payment handoff to Wave / Orange Money)
  url_launcher: ^6.3.2

  # OTP / PIN input widget
  pinput: ^6.0.2

  # Logo Generator
  flutter_launcher_icons: ^0.14.4
  # Internationalisation + XOF currency formatting
  intl: ^0.20.2

  # Skeleton loading shimmer
  shimmer: ^3.0.0

  # Push notifications
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0

  # Generated API client (openapi-generator dart-dio output)
  beauteavenue_api:
    path: packages/beauteavenue_api

  # JSON serialization (used by generated models)
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0
  built_value: ^8.12.5

  # Typography — Google Fonts (DM Sans + Cormorant Garamond)
  google_fonts: ^8.1.0

  # SVG icon rendering
  flutter_svg: ^2.2.4

  # Native share sheet (iOS + Android)
  share_plus: ^12.0.2

  # Map display — OpenStreetMap tiles, completely free, no API key
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # Widget → PNG for share cards
  screenshot: ^3.0.0

  # Temp file path for share image
  path_provider: ^2.1.5

  # Device location for proximity search
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  image_picker: ^1.2.2
  change_app_package_name: ^1.5.0
  phone_form_field: ^10.0.17
  one_of: ^1.5.0
  flutter_dotenv: ^6.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  freezed: ^3.0.0
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.1.0
  custom_lint: ^0.8.1
  hive_ce_generator: ^1.8.0

  # WCAG live scanner — open Flutter DevTools → accessibility_radar tab
  accessibility_radar: ^0.3.0
  patrol: ^4.6.0

patrol:
  app_name: Beauté Avenue
  android:
    package_name: sn.lic.beauteavenu
  ios:
    bundle_id: sn.lic.beauteavenu

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/logo.png
    - assets/om.png
    - assets/wave.png
    - assets/icons/
    - assets/onboarding/
