name: beauteavenue_mobile_client
description: Client mobile app for Beauté Avenue.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # HTTP
  dio: ^5.7.0

  # Responsive design (.r .sp .w .h)
  flutter_screenutil: ^5.9.3

  # Secure key-value (tokens only)
  flutter_secure_storage: ^9.2.2

  # Cache (lists, feed data)
  hive_ce: ^2.9.0
  hive_ce_flutter: ^2.2.0

  # Network images with caching
  cached_network_image: ^3.4.1

  # Offline detection
  connectivity_plus: ^6.1.0

  # External URLs (payment handoff to Wave / Orange Money)
  url_launcher: ^6.3.0

  # OTP / PIN input widget
  pinput: ^3.0.1

  # Internationalisation + XOF currency formatting
  intl: ^0.20.2

  # Skeleton loading shimmer
  shimmer: ^3.0.0

  # Push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  # Env config — no hardcoded base URLs
  flutter_dotenv: ^5.2.1

  # Generated API client (openapi-generator dart-dio output)
  beauteavenue_api:
    path: packages/beauteavenue_api

  # JSON serialization (used by generated models)
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0

  # Typography — Google Fonts (DM Sans + Cormorant Garamond)
  google_fonts: ^6.2.1

  # SVG icon rendering
  flutter_svg: ^2.0.10+1

  # Native share sheet (iOS + Android)
  share_plus: ^10.1.4

  # Map display — OpenStreetMap tiles, completely free, no API key
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Widget → PNG for share cards
  screenshot: ^3.0.0

  # Temp file path for share image
  path_provider: ^2.1.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  freezed: ^3.0.0
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.5
  custom_lint: ^0.7.3
  hive_ce_generator: ^1.8.0

  # WCAG live scanner — open Flutter DevTools → accessibility_radar tab
  accessibility_radar: ^0.3.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/logo.png
    - assets/om.png
    - assets/wave.png
    - assets/icons/
