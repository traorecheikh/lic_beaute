services:
  beauteave-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-beaute_avenue}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-beaute_avenue}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_internal

  beauteave-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app_internal

  api:
    image: ghcr.io/traorecheikh/lic_beaute:latest
    pull_policy: always
    restart: unless-stopped
    labels:
      - traefik.enable=true
      # HTTP → HTTPS redirect
      - traefik.http.routers.beauteavenue-http.rule=Host(`h255qm4nj3i832xhkls5270z.159.65.122.15.sslip.io`)
      - traefik.http.routers.beauteavenue-http.entrypoints=http
      - traefik.http.routers.beauteavenue-http.middlewares=beauteavenue-redirect
      - traefik.http.middlewares.beauteavenue-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.beauteavenue-redirect.redirectscheme.permanent=true
      # HTTPS with Let's Encrypt
      - traefik.http.routers.beauteavenue-https.rule=Host(`h255qm4nj3i832xhkls5270z.159.65.122.15.sslip.io`)
      - traefik.http.routers.beauteavenue-https.entrypoints=https
      - traefik.http.routers.beauteavenue-https.tls=true
      - traefik.http.routers.beauteavenue-https.tls.certresolver=letsencrypt
      - traefik.http.services.beauteavenue.loadbalancer.server.url=http://api:3000
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@beauteave-db:5432/${POSTGRES_DB:-beaute_avenue}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      WEB_ORIGIN: ${WEB_ORIGIN}
      EMAIL_DRIVER: ${EMAIL_DRIVER:-noop}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@beauteavenue.sn}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      OTP_DRIVER: ${OTP_DRIVER:-noop}
      AT_API_KEY: ${AT_API_KEY:-}
      AT_USERNAME: ${AT_USERNAME:-}
      PUSH_DRIVER: ${PUSH_DRIVER:-fcm}
      PAYMENT_DRIVER: ${PAYMENT_DRIVER:-mock}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      STORAGE_PATH: /app/uploads
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-http://localhost:3000}
      REDIS_URL: ${REDIS_URL:-redis://beauteave-redis:6379}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_TTL_CATALOG_SECONDS: ${CACHE_TTL_CATALOG_SECONDS:-45}
      CACHE_TTL_KPI_SECONDS: ${CACHE_TTL_KPI_SECONDS:-20}
      FCM_SERVICE_ACCOUNT_JSON_B64: ${FCM_SERVICE_ACCOUNT_JSON_B64:-}
      INTECH_API_KEY: ${INTECH_API_KEY:-}
      INTECH_API_SECRET: ${INTECH_API_SECRET:-}
    volumes:
      - media_uploads:/app/uploads
    depends_on:
      beauteave-db:
        condition: service_healthy
      beauteave-redis:
        condition: service_healthy
    networks:
      - app_internal
      - coolify

  worker:
    image: ghcr.io/traorecheikh/lic_beaute:latest
    pull_policy: always
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@beauteave-db:5432/${POSTGRES_DB:-beaute_avenue}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      EMAIL_DRIVER: ${EMAIL_DRIVER:-noop}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@beauteavenue.sn}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      OTP_DRIVER: ${OTP_DRIVER:-noop}
      AT_API_KEY: ${AT_API_KEY:-}
      AT_USERNAME: ${AT_USERNAME:-}
      PUSH_DRIVER: ${PUSH_DRIVER:-fcm}
      PAYMENT_DRIVER: ${PAYMENT_DRIVER:-mock}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      STORAGE_PATH: /app/uploads
      REDIS_URL: ${REDIS_URL:-redis://beauteave-redis:6379}
      WORKER_DRIVER: ${WORKER_DRIVER:-hybrid}
      QUEUE_CONCURRENCY_PAYMENTS: ${QUEUE_CONCURRENCY_PAYMENTS:-3}
      QUEUE_CONCURRENCY_NOTIFICATIONS: ${QUEUE_CONCURRENCY_NOTIFICATIONS:-8}
      QUEUE_CONCURRENCY_MAINTENANCE: ${QUEUE_CONCURRENCY_MAINTENANCE:-2}
      FCM_SERVICE_ACCOUNT_JSON_B64: ${FCM_SERVICE_ACCOUNT_JSON_B64:-}
    volumes:
      - media_uploads:/app/uploads
    depends_on:
      beauteave-db:
        condition: service_healthy
      beauteave-redis:
        condition: service_healthy
    networks:
      - app_internal

networks:
  app_internal:
    driver: bridge
  coolify:
    external: true

volumes:
  postgres_data:
  redis_data:
  media_uploads:
