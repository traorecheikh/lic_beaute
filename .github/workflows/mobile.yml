name: Mobile CI

on:
  pull_request:
    paths:
      - 'apps/mobile-client/**'
      - '.github/workflows/mobile.yml'
  push:
    branches: [main]
    paths:
      - 'apps/mobile-client/**'
      - '.github/workflows/mobile.yml'
  workflow_dispatch: {}

defaults:
  run:
    working-directory: apps/mobile-client

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.x
          channel: stable
          cache: true

      - name: Restore dependencies
        run: flutter pub get

      - name: Run dart analyze
        run: dart analyze lib/ test/

  test:
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.x
          channel: stable
          cache: true

      - name: Restore dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test --no-pub --reporter expanded
