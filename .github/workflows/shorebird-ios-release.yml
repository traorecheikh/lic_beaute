name: Shorebird iOS Release

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: Marketing version
        required: true
        default: "1.0.0"
      build_number:
        description: Build number
        required: true
        default: "8"

defaults:
  run:
    working-directory: apps/mobile-client

jobs:
  release-ios:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show host and Xcode
        run: |
          sw_vers
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('apps/mobile-client/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Shorebird
        uses: actions/cache@v4
        with:
          path: |
            ~/.shorebird
            ~/Library/Application Support/shorebird
          key: ${{ runner.os }}-shorebird-3.44.2
          restore-keys: |
            ${{ runner.os }}-shorebird-

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('apps/mobile-client/ios/Runner.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: Restore Firebase config and app env
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          IOS_GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          printf '%s\n' "$API_BASE_URL" > .env
          printf '%s' "$IOS_GOOGLE_SERVICE_INFO_PLIST" > ios/Runner/GoogleService-Info.plist

      - name: Install dependencies
        run: |
          flutter pub get
          flutter precache --ios

      - name: Install Shorebird
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh | bash
          echo "$HOME/.shorebird/bin" >> "$GITHUB_PATH"

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Import provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/build_profile.mobileprovision"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin <<<"$(security cms -D -i "$PROFILE_PATH")")
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>MJ59869224</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>sn.numuconnect.beauteavenue</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Verify imported signing identity
        run: |
          security default-keychain -d user
          security list-keychains -d user
          security find-identity -v -p codesigning
          security find-certificate -a -c "Apple Distribution: Numuconnect (MJ59869224)" -Z || true

      - name: Configure manual signing for CI
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          path = Path("ios/Runner.xcodeproj/project.pbxproj")
          text = path.read_text()
          profile_name = os.environ["PROFILE_NAME"]
          target_sections = [
              '97C147061CF9000F007C117D /* Debug */ = {',
              '97C147071CF9000F007C117D /* Release */ = {',
              '249021D4217E4FDB00AE95B9 /* Profile */ = {',
          ]
          for marker in target_sections:
              start = text.index(marker)
              build_settings = text.index('buildSettings = {', start)
              end = text.index('\n\t\t\t};', build_settings)
              section = text[build_settings:end]
              section = section.replace('"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "iPhone Developer";',
                                        '"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";')
              if 'CODE_SIGN_IDENTITY = "Apple Distribution";' not in section:
                  section += '\n\t\t\t\tCODE_SIGN_IDENTITY = "Apple Distribution";'
              if '"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";' not in section:
                  section += '\n\t\t\t\t"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";'
              if 'CODE_SIGN_STYLE = Manual;' in section:
                  section = section.replace('CODE_SIGN_STYLE = Manual;', 'CODE_SIGN_STYLE = Manual;')
              elif 'CODE_SIGN_STYLE = Automatic;' in section:
                  section = section.replace('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;')
              else:
                  section += '\n\t\t\t\tCODE_SIGN_STYLE = Manual;'
              if f'PROVISIONING_PROFILE_SPECIFIER = "{profile_name}";' not in section:
                  section += f'\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "{profile_name}";'
              text = text[:build_settings] + section + text[end:]
          path.write_text(text)
          PY

      - name: Build Shorebird iOS release
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          shorebird release ios \
            --flutter-version=3.44.2 \
            --build-name="${{ github.event.inputs.build_name }}" \
            --build-number="${{ github.event.inputs.build_number }}" \
            --export-options-plist "$RUNNER_TEMP/ExportOptions.plist"
