services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: beaute_avenue
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d beaute_avenue"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

