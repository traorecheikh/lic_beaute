services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-beaute_avenue}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-beaute_avenue}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-beaute_avenue}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      WEB_ORIGIN: ${WEB_ORIGIN}
      EMAIL_DRIVER: ${EMAIL_DRIVER:-noop}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@beauteavenue.sn}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      OTP_DRIVER: ${OTP_DRIVER:-noop}
      AT_API_KEY: ${AT_API_KEY:-}
      AT_USERNAME: ${AT_USERNAME:-}
      PUSH_DRIVER: ${PUSH_DRIVER:-fcm}
      PAYMENT_DRIVER: ${PAYMENT_DRIVER:-mock}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-noop}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_TTL_CATALOG_SECONDS: ${CACHE_TTL_CATALOG_SECONDS:-45}
      CACHE_TTL_KPI_SECONDS: ${CACHE_TTL_KPI_SECONDS:-20}
      FCM_SERVICE_ACCOUNT_JSON_B64: ${FCM_SERVICE_ACCOUNT_JSON_B64:-}
      INTECH_API_KEY: ${INTECH_API_KEY:-}
      INTECH_API_SECRET: ${INTECH_API_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"

  worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-beaute_avenue}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      EMAIL_DRIVER: ${EMAIL_DRIVER:-noop}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@beauteavenue.sn}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      OTP_DRIVER: ${OTP_DRIVER:-noop}
      AT_API_KEY: ${AT_API_KEY:-}
      AT_USERNAME: ${AT_USERNAME:-}
      PUSH_DRIVER: ${PUSH_DRIVER:-fcm}
      PAYMENT_DRIVER: ${PAYMENT_DRIVER:-mock}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-noop}
      FCM_SERVICE_ACCOUNT_JSON_B64: ${FCM_SERVICE_ACCOUNT_JSON_B64:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      WORKER_DRIVER: ${WORKER_DRIVER:-hybrid}
      QUEUE_CONCURRENCY_PAYMENTS: ${QUEUE_CONCURRENCY_PAYMENTS:-3}
      QUEUE_CONCURRENCY_NOTIFICATIONS: ${QUEUE_CONCURRENCY_NOTIFICATIONS:-8}
      QUEUE_CONCURRENCY_MAINTENANCE: ${QUEUE_CONCURRENCY_MAINTENANCE:-2}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
